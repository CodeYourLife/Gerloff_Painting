{% extends 'base.html' %}
{% block content %}
{% load static %}
<!DOCTYPE html>
<html>
<head>

	<style type="text/css" class="init">

	</style>
	<script type="text/javascript" src="/media/js/site.js?_=1d5abd169416a09a2b389885211721dd" data-domain="datatables.net" data-api="https://plausible.sprymedia.co.uk/api/event"></script>
	<script src="https://media.ethicalads.io/media/client/ethicalads.min.js"></script>
	<script type="text/javascript" src="/media/js/dynamic.php?comments-page=examples%2Fadvanced_init%2Fevents_live.html" async></script>
	<script type="text/javascript" src="/media/js/dynamic.php?comments-page=examples%2Fdata_sources%2Fdom.html" async></script>
	<script type="text/javascript" language="javascript" src="https://code.jquery.com/jquery-3.5.1.js"></script>
	<script type="text/javascript" language="javascript" src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
	<script type="text/javascript" language="javascript" src="../resources/demo.js"></script>
	<script type="text/javascript" class="init">
		function validate(){
            value = event.target.value;
		    if (value != null && value != ""){
                document.getElementById('submitBtn').removeAttribute('disabled')
            }
            else {
                document.getElementById('submitBtn').setAttribute('disabled', true);
            }
		}

	</script>
</head>
<body>
	<div style="padding-top: 20%" class="container">
    <div class="row h-100 d-flex align-items-center justify-content-center">
    <div class="col-6">
        <form action = "{% url 'verify_pin' %}" method = "post" class="form-group">
            {% csrf_token %}

			<br>
            <label for="pin">PIN</label>
            <input id="pin" oninput="validate(event)" type="number" name = "pin" placeholder="Employee PIN" class="form-control">
            <small id="pinHelp" class="form-text text-muted">Please enter your PIN.</small>
			<input type="submit" id="submitBtn" disabled name = "pin_entered" class="btn btn-primary btn-sm" value="Submit" >
			<div class="text-danger">{{message}}</div>
		</form>
    </div>
</div>
</div>
<br>


</body>
</html>

{% endblock %}
