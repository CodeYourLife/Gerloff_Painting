{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container-fluid mt-4">

<h3 class="mb-4">Time & Material Price List</h3>

{% for category, items in data.items %}

<div class="card mb-4 shadow-sm">

<div class="card-header bg-dark text-white">
    {{ category }}
</div>

<div class="card-body p-0">

<table class="table table-sm table-striped mb-0">

<thead class="thead-light">
<tr>
<th style="width:300px;">Item</th>
<th style="width:150px;">Unit</th>
<th style="width:150px;">Rate</th>
<th style="width:200px;"></th>
</tr>
</thead>

<tbody>

{% for row in items %}

<tr>

<form method="POST">
{% csrf_token %}

<input type="hidden" name="id" value="{{ row.id }}">
<input type="hidden" name="action" value="update">

<td>
<input type="text" name="item" value="{{ row.item }}" class="form-control form-control-sm">
</td>

<td>
<input type="text" name="unit" value="{{ row.unit }}" class="form-control form-control-sm">
</td>

<td>
<input type="number" step="0.01" name="rate" value="{{ row.rate }}" class="form-control form-control-sm">
</td>

<td>

<button class="btn btn-sm btn-success">
Save
</button>

<button type="submit"
        formaction=""
        name="action"
        value="delete"
        class="btn btn-sm btn-danger">
Delete
</button>

</td>

</form>

</tr>

{% endfor %}

</tbody>

</table>

</div>


<div class="card-footer">

<button class="btn btn-primary btn-sm"
        onclick="showAddRow('{{ category }}')">

+ Add {{ category }} Item

</button>

</div>

</div>

{% endfor %}

</div>

<div class="modal fade" id="addItemModal">

<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header bg-primary text-white">
Add Item
</div>

<form method="POST">

{% csrf_token %}

<input type="hidden" name="action" value="add">
<input type="hidden" id="category_field" name="category">

<div class="modal-body">

<div class="form-group">
<label>Item</label>
<input type="text" name="item" class="form-control" required>
</div>

<div class="form-group">
<label>Unit</label>
<input type="text" name="unit" class="form-control" required>
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" step="0.01" name="rate" class="form-control" required>
</div>

</div>

<div class="modal-footer">

<button class="btn btn-success">
Add Item
</button>

</div>

</form>

</div>
</div>

</div>
{% endblock %}
<script>

function showAddRow(category){

document.getElementById("category_field").value = category;

$('#addItemModal').modal('show');

}

</script>
