{% extends 'base.html' %}
{% load static %}
{% block nav_item_employees %}active{% endblock nav_item_employees %}
{% block content %}
<!DOCTYPE html>
<html>
<head>

	<style type="text/css" class="init">


	</style>
<link rel="stylesheet" href="{% static 'project_styles.css' %}">
	<script type="text/javascript" class="init">
function selecttopic(){
var select = document.getElementById("select_topic");
var destination = document.getElementById("custom_here");
if (select.value == "select_custom"){
destination.innerHTML = "<input type='text' name='custom_topic' size='50' placeholder='Custom Topic Here' />"
}
else{ destination.innerHTML = ""}
}

	</script>
</head>
<body>
  <nav class="sub-nav navbar navbar-expand-sm navbar-dark bg-dark">
    <a class="navbar-brand sub-navbar-brand" href="#">Employees</a>
    <div id="navbarNavDropdown2">
      <ul class="sub-nav-list navbar-nav ">
        <li><a class="nav-item nav-link" href="{% url 'employees_home' %}">Home</a></li>
        <!--            <li><a class="nav-item nav-link" href="{% url 'training' %}">Training</a></li>-->
        <li><a class="nav-item nav-link" href="{% url 'my_page' %}">My Page</a></li>
        <li><a class="nav-item nav-link" href="{% url 'certifications' 'ALL' %}">Certifications</a></li>
		<li><a class="nav-item nav-link" href="{% url 'write_ups' 'ALL' %}">Write_Ups</a></li>
        <li><a class="nav-item nav-link" href="{% url 'add_new_employee' %}">New Employee</a></li>
        <li><a class="nav-item nav-link" href="{% url 'safety_home' %}">Safety</a></li>
        <li><a class="nav-item nav-link active" >NEW WRITE UP!</a></li>
    </ul>
  </div>
</nav><br>
 <form action="{% url 'write_ups_new' %}" method="post" >
     	 {% csrf_token %}
          			 <label for="select_supervisor">Select Supervisor: </label>
            <select id="select_supervisor" name="select_supervisor" >
				<option value={{me.id}}>{{me}}</option>
                {% for x in employees %}
                <option value={{x.id}}>{{x}}</option>
                {% endfor %}
            </select>
     <br><br>
			 <label for="select_employee">Select Employee: </label>
            <select id="select_employee" name="select_employee" >
				<option value="please_select">Please Select</option>
                {% for x in employees %}
                <option value={{x.id}}>{{x.first_name}} {{x.last_name}}</option>
                {% endfor %}
            </select>
	 		<br><br>
     			 <label for="select_job">Select Job: </label>
            <select id="select_job" name="select_job" >
				<option value="please_select">Please Select</option>
                {% for x in jobs %}
                <option value={{x.job_number}}>{{x.job_name}}</option>
                {% endfor %}
            </select>
	 		<br><br>
			 <label for="select_topic">Select Topic: </label>
            <select id="select_topic" name="select_topic" onChange="selecttopic()" >
				<option value="please_select">Please Select</option>
                <option value="select_custom">Custom Topic</option>
                {% for x in defaults %}
                <option value={{x.description}}>{{x.description}}</option>
                {% endfor %}
            </select><div id="custom_here" ></div>
	 		<br><br>

     <textarea name="note" rows="2" cols="100" placeholder="Notes" ></textarea>
	 <br>

<input type="submit" name="complete" value="ADD NOW" />
 </form>
</body>
</html>

{% endblock %}
