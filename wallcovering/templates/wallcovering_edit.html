{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-3">

    <h4 class="mb-3">Edit Wallcovering</h4>

    <form method="post">
        {% csrf_token %}

        <div class="card shadow-sm mb-3">
            <div class="card-header bg-dark text-white">
                <strong>Wallcovering Information</strong>
            </div>

            <div class="card-body">

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Job</label>
                        <select name="job_number" class="form-control select2" required>
                            <option value="">Select Job</option>
                            {% for job in jobs %}
                                <option value="{{ job.job_number }}"
                                    {% if wallcovering.job_number.job_number == job.job_number %}selected{% endif %}>
                                    {{ job.job_number }} {{ job.job_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group col-md-3">
                        <label>Code</label>
                        <input type="text" name="code" class="form-control" value="{{ wallcovering.code|default:'' }}">
                    </div>

                    <div class="form-group col-md-3">
                        <label>Vendor</label>
                        <select name="vendor" class="form-control select2-tags" required>
                            <option value="">Select or Type Vendor</option>
                            {% for v in vendors %}
                                <option value="{{ v.company_name }}"
                                    {% if wallcovering.vendor.company_name == v.company_name %}selected{% endif %}>
                                    {{ v.company_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Pattern</label>
                        <input type="text" name="pattern" class="form-control" required value="{{ wallcovering.pattern|default:'' }}">
                    </div>
                    <div class="form-group col-md-4">
                        <label>Estimated Quantity</label>
                        <input type="number" name="estimated_quantity" class="form-control" value="{{ wallcovering.estimated_quantity }}">
                    </div>
                    <div class="form-group col-md-4">
                        <label>Estimated Unit</label>
                        <input type="text" name="estimated_unit" class="form-control" value="{{ wallcovering.estimated_unit|default:'' }}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Roll Width</label>
                        <input type="text" name="roll_width" class="form-control" value="{{ wallcovering.roll_width|default:'' }}">
                    </div>

                    <div class="form-group col-md-4">
                        <label>Roll Length</label>
                        <input type="text" name="roll_length" class="form-control" value="{{ wallcovering.roll_length|default:'' }}">
                    </div>
                    <div class="form-group col-md-4">
                        <label>Increment Requirement</label>
                        <input type="text"
                               name="increment_requirement"
                               class="form-control"
                               value="{{ wallcovering.increment_requirement|default:'' }}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Vertical Repeat</label>
                        <input type="text" name="vertical_repeat" class="form-control" value="{{ wallcovering.vertical_repeat|default:'' }}">
                    </div>

                    <div class="form-group col-md-4">
                        <label>Cut Charge</label>
                        <input type="text" name="cut_charge" class="form-control" value="{{ wallcovering.cut_charge|default:'' }}">
                    </div>

                    <div class="form-group col-md-4">
                        <label>&nbsp;</label>

                        <div class="form-check">
                            <input type="checkbox" name="is_owner_furnished" class="form-check-input"
                                   {% if wallcovering.is_owner_furnished %}checked{% endif %}>
                            <label class="form-check-label">Owner Furnished</label>
                        </div>

                        <div class="form-check">
                            <input type="checkbox" name="is_random_reverse" class="form-check-input"
                                   {% if wallcovering.is_random_reverse %}checked{% endif %}>
                            <label class="form-check-label">Random Match</label>
                        </div>

                        <div class="form-check">
                            <input type="checkbox" name="is_repeat" class="form-check-input"
                                   {% if wallcovering.is_repeat %}checked{% endif %}>
                            <label class="form-check-label">Repeat Pattern</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" class="form-control">{{ wallcovering.notes|default:'' }}</textarea>
                </div>

            </div>
        </div>

        <button type="submit" class="btn btn-success btn-lg">
            Save Changes
        </button>

        <a href="{% url 'wallcovering_detail' wallcovering.id %}" class="btn btn-secondary btn-lg">
            Cancel
        </a>

    </form>

</div>

{% endblock %}


{% block extra_scripts %}
<script>
$(document).ready(function () {
    $('.select2').select2({
        width: '100%',
        placeholder: 'Search Job...'
    });

    $('.select2-tags').select2({
        width: '100%',
        tags: true,
        placeholder: 'Select or type vendor'
    });

    const verticalRepeatInput = $('input[name="vertical_repeat"]');
    const repeatCheckbox = $('input[name="is_repeat"]');
    const randomReverseCheckbox = $('input[name="is_random_reverse"]');

    verticalRepeatInput.on('input', function () {
        if ($(this).val().trim() !== '') {
            repeatCheckbox.prop('checked', true);
            randomReverseCheckbox.prop('checked', false);
        }
    });

    repeatCheckbox.on('change', function () {
        if ($(this).is(':checked')) {
            randomReverseCheckbox.prop('checked', false);
        }
    });

    randomReverseCheckbox.on('change', function () {
        if ($(this).is(':checked')) {
            repeatCheckbox.prop('checked', false);
        }
    });

    $('form').on('submit', function (e) {
        const verticalRepeat = verticalRepeatInput.val().trim();
        const isRepeat = repeatCheckbox.is(':checked');
        const isRandomReverse = randomReverseCheckbox.is(':checked');
        const vendor = $('select[name="vendor"]').val();
        const pattern = $('input[name="pattern"]').val().trim();

        if (!vendor) {
            e.preventDefault();
            alert('Vendor is required.');
            return false;
        }

        if (pattern === '') {
            e.preventDefault();
            alert('Pattern is required.');
            $('input[name="pattern"]').focus();
            return false;
        }


        if (isRepeat && isRandomReverse) {
            e.preventDefault();
            alert('You cannot check both Random and Repeat.');
            return false;
        }

        if (isRepeat && verticalRepeat === '') {
            e.preventDefault();
            alert('If Repeat is checked, Vertical Repeat must be filled in.');
            verticalRepeatInput.focus();
            return false;
        }
        if (verticalRepeat !== '' && !isRepeat) {
            e.preventDefault();
            alert('Repeat Match must be checked if a Vertical Repeat is entered.');
            repeatCheckbox.focus();
            return false;
        }
    });
});
</script>
{% endblock %}
